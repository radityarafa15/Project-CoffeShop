<div
  class="flex overflow-x-auto pb-4 gap-3 mb-6 whitespace-nowrap no-scrollbar px-2"
>
  <button
    onclick="filterProduk('all')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Semua
  </button>
  <button
    onclick="filterProduk('Coffe')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Coffe
  </button>
  <button
    onclick="filterProduk('Non-Coffe')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Non-Coffe
  </button>
  <button
    onclick="filterProduk('makanan')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Makanan
  </button>
  <button
    onclick="filterProduk('pastry')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Pastry
  </button>
  <button
    onclick="filterProduk('Mocktail')"
    class="px-6 py-2 bg-gray-200 rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0"
  >
    Mocktail
  </button>
</div>

<div
  id="toast"
  class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2"
>
  <span>✅</span>
  <span id="toast-message">Berhasil masuk keranjang!</span>
</div>
