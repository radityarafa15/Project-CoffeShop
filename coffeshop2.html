<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqashh - Premium Coffee Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      /* Custom CSS sembunyikan scrollbar tapi bisa discroll */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-yellow-50">
    <nav class="bg-white shadow-md fixed w-full z-20 top-0 left-0">
      <div
        class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <h1
          class="text-xl md:text-2xl font-bold text-amber-900 cursor-pointer flex items-center gap-2"
          onclick="window.scrollTo(0,0)"
        >
          <span>🍵</span> Aqashh Coffee
        </h1>

        <div class="flex items-center gap-4 md:gap-6">
          <div id="user-panel" class="flex items-center gap-2">
            <button
              id="btn-login"
              onclick="toggleLoginModal()"
              class="text-amber-800 font-bold hover:bg-amber-100 px-3 py-1 rounded transition text-sm md:text-base"
            >
              Masuk
            </button>
            <div id="user-info" class="hidden items-center gap-3">
              <span
                id="user-name-display"
                class="font-semibold text-gray-700 hidden md:block"
                >User</span
              >
              <button
                onclick="logout()"
                class="text-xs text-red-500 border border-red-500 px-2 py-1 rounded hover:bg-red-500 hover:text-white transition"
              >
                Logout
              </button>
            </div>
          </div>

          <div class="relative cursor-pointer" onclick="toggleCart()">
            <span class="text-2xl">🛒</span>
            <span
              id="cart-count"
              class="absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded-full hidden"
              >0</span
            >
          </div>
        </div>
      </div>
    </nav>

    <div
      id="login-modal"
      class="fixed inset-0 bg-black bg-opacity-60 hidden z-50 flex justify-center items-center px-4"
    >
      <div
        class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm relative animate-fade-in-up"
      >
        <button
          onclick="toggleLoginModal()"
          class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl font-bold"
        >
          &times;
        </button>

        <h3 class="text-2xl font-bold text-center text-amber-900 mb-2">
          Selamat Datang!
        </h3>
        <p class="text-gray-500 text-center mb-6 text-sm">
          Simpan data agar pemesanan lebih cepat.
        </p>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Nama Lengkap</label
            >
            <input
              type="text"
              id="input-nama"
              placeholder="Contoh: Budi Santoso"
              class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Nomor WhatsApp</label
            >
            <input
              type="number"
              id="input-hp"
              placeholder="Contoh: 08123456789"
              class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
            />
          </div>
          <button
            onclick="simpanAkun()"
            class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-3 rounded-lg transition shadow-lg"
          >
            Simpan Data
          </button>
        </div>
      </div>
    </div>

    <header
      class="mt-16 bg-amber-900 text-white py-24 text-center px-4 bg-[url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=1600')] bg-cover bg-center bg-blend-multiply"
    >
      <h2 class="text-3xl md:text-5xl font-bold mb-4 drop-shadow-md">
        Nikmati Kopi Terbaik
      </h2>
      <p class="text-lg text-gray-200 mb-8 max-w-2xl mx-auto">
        Nikmati Kopi Premium dengan Harga Terjangkau di Aqashh Kopi.
      </p>
      <button
        onclick="document.getElementById('menu').scrollIntoView({behavior: 'smooth'})"
        class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-full transition shadow-lg transform hover:scale-105"
      >
        Pesan Sekarang
      </button>
    </header>

    <section id="menu" class="max-w-6xl mx-auto px-4 py-16">
      <h3 class="text-3xl font-bold text-gray-800 text-center mb-8">
        Daftar Menu
      </h3>

      <div
        class="flex overflow-x-auto pb-4 gap-3 mb-8 whitespace-nowrap no-scrollbar px-2 justify-start md:justify-center"
      >
        <button
          onclick="filterProduk('all')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Semua
        </button>
        <button
          onclick="filterProduk('Coffe')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Coffee
        </button>
        <button
          onclick="filterProduk('Non-Coffe')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Non-Coffee
        </button>
        <button
          onclick="filterProduk('makanan')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Makanan
        </button>
        <button
          onclick="filterProduk('pastry')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Pastry
        </button>
        <button
          onclick="filterProduk('Mocktail')"
          class="px-6 py-2 bg-white border border-amber-100 shadow-sm rounded-full hover:bg-amber-800 hover:text-white transition flex-shrink-0 text-amber-900 font-medium"
        >
          Mocktail
        </button>
      </div>

      <div
        id="product-list"
        class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"
      ></div>
    </section>

    <div
      id="cart-modal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex justify-end"
    >
      <div
        class="bg-white w-full max-w-md h-full p-6 overflow-y-auto shadow-xl transition-transform transform translate-x-full flex flex-col"
        id="cart-panel"
      >
        <div class="flex justify-between items-center mb-6 border-b pb-4">
          <h3 class="text-xl font-bold text-amber-900">Pesanan Anda</h3>
          <button
            onclick="toggleCart()"
            class="text-gray-400 hover:text-red-500 font-bold text-2xl"
          >
            &times;
          </button>
        </div>

        <div id="cart-items" class="flex-1 space-y-4 mb-6 overflow-y-auto">
          <p class="text-gray-500 text-center mt-10">Keranjang masih kosong.</p>
        </div>

        <div class="border-t pt-4 space-y-3 bg-gray-50 p-4 rounded-lg">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Tipe Pesanan</label
            >
            <select
              id="order-type"
              onchange="toggleLokasi()"
              class="w-full border border-gray-300 px-3 py-2 rounded-lg text-sm bg-white focus:ring-2 focus:ring-amber-500 outline-none"
            >
              <option value="Dine-in">🍽️ Makan di Tempat (Dine-in)</option>
              <option value="Takeaway">🥡bagging Bawa Pulang (Takeaway)</option>
              <option value="Delivery">🛵 Pesan Antar (Delivery)</option>
            </select>
          </div>

          <div>
            <label
              id="label-lokasi"
              class="block text-sm font-bold text-gray-700 mb-1"
              >Nomor Meja</label
            >
            <input
              type="text"
              id="input-lokasi"
              placeholder="Contoh: Meja 12"
              class="w-full border border-gray-300 px-3 py-2 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none"
            />
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Catatan (Opsional)</label
            >
            <textarea
              id="input-catatan"
              rows="2"
              placeholder="Contoh: Kopi jangan terlalu manis, es dipisah..."
              class="w-full border border-gray-300 px-3 py-2 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none"
            ></textarea>
          </div>

          <div
            class="flex justify-between text-lg font-bold mt-4 pt-2 border-t border-gray-200"
          >
            <span>Total:</span>
            <span id="cart-total" class="text-amber-700">Rp 0</span>
          </div>

          <button
            onclick="prosesCheckout()"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg flex justify-center items-center gap-2 shadow-lg transition transform hover:scale-[1.02]"
          >
            <span class="text-xl">📱</span>
            <span>Kirim Pesanan ke WA</span>
          </button>
        </div>
      </div>
    </div>

    <div
      id="toast"
      class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2 text-sm"
    >
      <span>✅</span>
      <span id="toast-message">Berhasil!</span>
    </div>

    <script>
      // --- DATA PRODUK ---
      const products = [
        {
          id: 1,
          name: "Kopi Susu Aren",
          price: 30000,
          category: "Coffe",
          image:
            "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&q=80&w=300",
        },
        {
          id: 2,
          name: "Americano",
          price: 28000,
          category: "Coffe",
          image:
            "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=300",
        },
        {
          id: 3,
          name: "Caramel Macchiato",
          price: 32000,
          category: "Coffe",
          image:
            "https://www.allrecipes.com/thmb/LgtetzzQWH3GMxFISSii84XEAB8=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/258686-IcedCaramelMacchiato-ddmps-4x3-104704-2effb74f7d504b8aa5fbd52204d0e2e5.jpg",
        },
        {

        },
        {
          id: 5,
          name: "Red Velvet",
          price: 33000,
          category: "Non-Coffe",
          image:
            "https://cdn.medcom.id/dynamic/content/2022/05/11/1423891/YtJZlqxdfS.jpg?w=640",
        },
        {
          id: 6,
          name: "Ice Tea Premium",
          price: 25000,
          category: "Non-Coffe",
          image:
            "https://bakingamoment.com/wp-content/uploads/2024/05/IMG_3367-iced-tea.jpg",
        },
        {
          id: 7,
          name: "Lemon Squash",
          price: 35000,
          category: "Non-Coffe",
          image:
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlyipBqi9fkCvyFl-WT9sOlTry0veLlXMlLg&s",
        },
        {
          id: 8,
          name: "Espresso",
          price: 25000,
          category: "Coffe",
          image:
            "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=300",
        },
        {
          id: 9,
          name: "Nasi Goreng Rempah",
          price: 36000,
          category: "makanan",
          image:
            "https://www.ajinomoto.co.id/image/original/visit/2025/01/16/images/thumbnail-resep-nasi-goreng-rempah-wangi._667e84e594d3e64e0f47781bd9b17f68.png",
        },
        {
          id: 10,
          name: "Nasi Goreng Kampung",
          price: 40000,
          category: "makanan",
          image:
            "https://imgx.sonora.id/crop/0x0:0x0/x/photo/2025/05/20/nasgooorjpg-20250520120938.jpg",
        },
        {
          id: 11,
          name: "Spaghetti Bolognese",
          price: 78000,
          category: "makanan",
          image:
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8TCBOahTQxezUf8pg8AF4lM-SChnHhiU-Tw&s",
        },
        {
          id: 12,
          name: "Spaghetti Carbonara",
          price: 75000,
          category: "makanan",
          image:
            "https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0346a29a89ef229b1a0ff9697184f944/Derivates/cb5051204f4a4525c8b013c16418ae2904e737b7.jpg",
        },
        {
          id: 13,
          name: "Spaghetti Aglio e Olio",
          price: 80000,
          category: "makanan",
          image:
            "https://images.services.kitchenstories.io/UY89c4f471NaK1C-BQ07FGZ_qVA=/3840x0/filters:quality(80)/images.kitchenstories.io/wagtailOriginalImages/R131-final-photo-3-sg.jpg",
        },
        {
          id: 14,
          name: "Croissant",
          price: 27000,
          category: "pastry",
          image:
            "https://en.julskitchen.com/wp-content/uploads/sites/2/2013/05/Italian-croissants-15.jpg",
        },
        {
          id: 15,
          name: "Blueberry Muffin",
          price: 29000,
          category: "pastry",
          image:
            "https://www.ambitiouskitchen.com/wp-content/uploads/fly-images/44547/blueberrymuffins-4-500x500-c.jpg",
        },
        {
          id: 16,
          name: "Chocolate Cake",
          price: 30000,
          category: "pastry",
          image:
            "https://sugargeekshow.com/wp-content/uploads/2023/10/easy_chocolate_cake_slice.jpg",
        },
        {
          id: 17,
          name: "White Cheesecake",
          price: 35000,
          category: "pastry",
          image:
            "https://www.recipetineats.com/tachyon/2024/09/No-bake-cheesecake_8.jpg",
        },
        {
          id: 18,
          name: "Mojito Virgin",
          price: 38000,
          category: "Mocktail",
          image:
            "https://staticcookist.akamaized.net/wp-content/uploads/sites/22/2021/07/virgin-mojito-1200x675.jpeg",
        },
        {
          id: 19,
          name: "Virgin Pina Colada",
          price: 40000,
          category: "Mocktail",
          image:
            "https://images.kitchenstories.io/recipeImages/32_06_VirginPinaColada_TitlePicture.jpg",
        },
        {
          id: 20,
          name: "Sunrise Mocktail",
          price: 42000,
          category: "Mocktail",
          image:
            "https://butfirstwebrunch.com/wp-content/uploads/2024/06/sunrise-mocktail-3.jpg",
        },
        {
          id: 21,
          name: "Mango Mule",
          price: 39000,
          category: "Mocktail",
          image:
            "https://s7ap1.scene7.com/is/image/itcportalprod/bnatural-mango-mule?fmt=webp-alpha",
        },
      ];

      // --- STATE MANAGEMENT ---
      // Ambil data dari LocalStorage saat load
      let cart = JSON.parse(localStorage.getItem("aqashhCart")) || [];
      let currentUser = null;

      // --- FUNGSI USER & SESI ---
      function checkUserSession() {
        const storedUser = localStorage.getItem("kopiUser");
        if (storedUser) {
          currentUser = JSON.parse(storedUser);
          updateUserUI(true);
        } else {
          updateUserUI(false);
        }
      }

      function simpanAkun() {
        const nama = document.getElementById("input-nama").value;
        const hp = document.getElementById("input-hp").value;

        if (!nama || !hp) return alert("Mohon lengkapi Nama dan No HP!");

        currentUser = { nama: nama, hp: hp };
        localStorage.setItem("kopiUser", JSON.stringify(currentUser));

        toggleLoginModal();
        updateUserUI(true);
        showToast(`Halo ${nama}, data tersimpan!`);
      }

      function logout() {
        if (confirm("Yakin ingin keluar?")) {
          localStorage.removeItem("kopiUser");
          currentUser = null;
          updateUserUI(false);
          showToast("Berhasil logout.");
        }
      }

      function updateUserUI(isLoggedIn) {
        const btnLogin = document.getElementById("btn-login");
        const userInfo = document.getElementById("user-info");
        const userNameDisplay = document.getElementById("user-name-display");

        if (isLoggedIn) {
          btnLogin.classList.add("hidden");
          userInfo.classList.remove("hidden");
          userInfo.classList.add("flex");
          userNameDisplay.innerText = "Hi, " + currentUser.nama.split(" ")[0];
        } else {
          btnLogin.classList.remove("hidden");
          userInfo.classList.add("hidden");
          userInfo.classList.remove("flex");
        }
      }

      function toggleLoginModal() {
        const modal = document.getElementById("login-modal");
        modal.classList.toggle("hidden");
      }

      // sistem PRODUCT & CART ---

      // Helper untuk menyimpan cart ke LocalStorage
      function saveCart() {
        localStorage.setItem("aqashhCart", JSON.stringify(cart));
        updateCartUI();
      }

      function filterProduk(kategori) {
        const container = document.getElementById("product-list");
        let filtered = products;

        if (kategori !== "all") {
          filtered = products.filter(
            (p) => p.category.toLowerCase() === kategori.toLowerCase()
          );
        }

        // Render Produk dengan cara yang lebih efisien untuk (Mapping)
        const html = filtered
          .map(
            (p) => `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-300 transform hover:-translate-y-1 border border-gray-100 flex flex-col">
                <div class="h-40 md:h-48 overflow-hidden relative group">
                    <img src="${p.image}" alt="${
              p.name
            }" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-10 transition"></div>
                </div>
                <div class="p-4 flex-1 flex flex-col justify-between">
                    <div>
                        <h4 class="font-bold text-base md:text-lg mb-1 text-gray-800 line-clamp-1">${
                          p.name
                        }</h4>
                        <p class="text-amber-600 font-bold text-base md:text-lg">Rp ${p.price.toLocaleString(
                          "id-ID"
                        )}</p>
                    </div>
                    <button onclick="addToCart(${
                      p.id
                    })" class="mt-4 w-full bg-amber-800 text-white py-2 rounded-lg hover:bg-amber-900 transition flex justify-center items-center gap-2 active:scale-95 text-sm md:text-base shadow-md">
                        <span>+</span> Tambah
                    </button>
                </div>
            </div>
        `
          )
          .join("");

        container.innerHTML = html;
      }

      function addToCart(id) {
        const p = products.find((x) => x.id === id);
        const existing = cart.find((x) => x.id === id);

        if (existing) {
          existing.qty++;
        } else {
          cart.push({ ...p, qty: 1 });
        }

        saveCart(); // Simpan otomatis
        showToast(`${p.name} masuk keranjang!`);

        // Animasi kecil di icon keranjang
        const badge = document.getElementById("cart-count");
        badge.classList.add("animate-bounce");
        setTimeout(() => badge.classList.remove("animate-bounce"), 1000);
      }

      function changeQty(index, change) {
        cart[index].qty += change;
        if (cart[index].qty <= 0) {
          cart.splice(index, 1);
        }
        saveCart();
      }

      function updateCartUI() {
        const container = document.getElementById("cart-items");
        const badge = document.getElementById("cart-count");
        const totalElem = document.getElementById("cart-total");

        const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
        badge.innerText = totalQty;
        badge.className =
          totalQty > 0
            ? "absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded-full"
            : "hidden";

        if (cart.length === 0) {
          container.innerHTML =
            '<div class="flex flex-col items-center justify-center h-40 text-gray-400"><span class="text-4xl mb-2">🛒</span><p>Keranjang kosong.</p></div>';
          totalElem.innerText = "Rp 0";
          return;
        }

        let total = 0;
        const html = cart
          .map((item, index) => {
            let subtotal = item.price * item.qty;
            total += subtotal;
            return `
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <div class="flex-1">
                    <p class="font-bold text-gray-800 text-sm md:text-base">${
                      item.name
                    }</p>
                    <p class="text-xs text-gray-500">@ Rp ${item.price.toLocaleString(
                      "id-ID"
                    )}</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex items-center bg-gray-100 rounded-lg">
                         <button onclick="changeQty(${index}, -1)" class="px-2 py-1 text-gray-600 hover:text-red-500 font-bold">-</button>
                         <span class="text-sm font-bold w-4 text-center">${
                           item.qty
                         }</span>
                         <button onclick="changeQty(${index}, 1)" class="px-2 py-1 text-gray-600 hover:text-green-500 font-bold">+</button>
                    </div>
                    <div class="text-right w-16 md:w-20">
                        <p class="font-bold text-amber-600 text-sm">Rp ${subtotal.toLocaleString(
                          "id-ID"
                        )}</p>
                    </div>
                </div>
            </div>`;
          })
          .join("");

        container.innerHTML = html;
        totalElem.innerText = "Rp " + total.toLocaleString("id-ID");
      }

      function toggleCart() {
        const modal = document.getElementById("cart-modal");
        const panel = document.getElementById("cart-panel");
        if (modal.classList.contains("hidden")) {
          modal.classList.remove("hidden");
          setTimeout(() => panel.classList.remove("translate-x-full"), 10);
        } else {
          panel.classList.add("translate-x-full");
          setTimeout(() => modal.classList.add("hidden"), 300);
        }
      }

      //  CHECKOUT LOGIKA
      function toggleLokasi() {
        const type = document.getElementById("order-type").value;
        const label = document.getElementById("label-lokasi");
        const input = document.getElementById("input-lokasi");

        if (type === "Dine-in") {
          label.innerText = "Nomor Meja";
          input.placeholder = "Contoh: Meja 12";
        } else if (type === "Delivery") {
          label.innerText = "Alamat Lengkap";
          input.placeholder = "Jalan, No Rumah, Patokan...";
        } else {
          label.innerText = "Nama Pengambil";
          input.placeholder = "Siapa yang akan ambil?";
        }
      }

      function prosesCheckout() {
        if (cart.length === 0) return alert("Keranjang kosong!");

        if (!currentUser) {
          alert("Silakan login/isi data diri dulu!");
          toggleCart();
          toggleLoginModal();
          return;
        }

        const orderType = document.getElementById("order-type").value;
        const lokasi = document.getElementById("input-lokasi").value;
        const catatan = document.getElementById("input-catatan").value;

        if (!lokasi) return alert("Mohon lengkapi info Lokasi / No Meja!");

        // nomor admin cafe
        const adminWA = "6281292772775";

        let msg = `*ORDER BARU - AQASHH COFFEE* ☕%0A`;
        msg += `--------------------------------%0A`;
        msg += `👤 *Pemesan:* ${currentUser.nama}%0A`;
        msg += `📞 *No HP:* ${currentUser.hp}%0A`;
        msg += `🛍️ *Tipe:* ${orderType}%0A`;
        msg += `📍 *Lokasi:* ${lokasi}%0A`;
        msg += `--------------------------------%0A`;

        msg += `*Daftar Pesanan:*%0A`;
        cart.forEach((item) => {
          msg += `- ${item.name} (${item.qty}x) = Rp ${(
            item.price * item.qty
          ).toLocaleString("id-ID")}%0A`;
        });

        const total = cart.reduce(
          (sum, item) => sum + item.price * item.qty,
          0
        );
        msg += `--------------------------------%0A`;
        msg += `📝 *Catatan:* ${catatan || "-"}-%0A`;
        msg += `💰 *TOTAL: Rp ${total.toLocaleString("id-ID")}*%0A%0A`;
        msg += `Mohon diproses ya, Terima kasih!`;

        window.open(`https://wa.me/${adminWA}?text=${msg}`, "_blank");
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        const toastMsg = document.getElementById("toast-message");

        toastMsg.innerText = message;
        toast.classList.remove("opacity-0");
        toast.classList.remove("translate-y-10");

        setTimeout(() => {
          toast.classList.add("opacity-0");
        }, 3000);
      }

      // init (menyiapkan atau memberikan nilai awal pada variabel, objek, atau sistem sebelum digunakan)
      // Jalankan saat load
      filterProduk("all");
      checkUserSession(); // Cek login
      updateCartUI(); //  keranjang tersimpan
      toggleLokasi(); // default checkout
    </script>
  </body>
</html>
